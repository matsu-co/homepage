name: Build data

on:
  push:
    branches:
      - main
    paths:
      - 'content/**'
      - 'images/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build data
        run: npm run build

      - name: Commit generated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'auto: rebuild data [skip ci]'
          file_pattern: '*.json'
