name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Convert images to WebP
        run: |
          cat > convert-webp.js << 'EOF'
          const sharp = require('sharp');
          const fs = require('fs');
          const path = require('path');

          const SUBDIRS = ['images/photo', 'images/comicdiary', 'images/work', 'images/diary'];
          const QUALITY = 85;

          (async () => {
            let converted = 0;
            for (const dir of SUBDIRS) {
              if (!fs.existsSync(dir)) continue;
              for (const file of fs.readdirSync(dir)) {
                const ext = path.extname(file).toLowerCase();
                if (!['.jpg', '.jpeg', '.png'].includes(ext)) continue;
                const src = path.join(dir, file);
                const dest = path.join(dir, file.replace(/\.[^.]+$/, '.webp'));
                if (fs.existsSync(dest)) { console.log('skip:', dest); continue; }
                try {
                  await sharp(src).webp({ quality: QUALITY }).toFile(dest);
                  const o = fs.statSync(src).size;
                  const n = fs.statSync(dest).size;
                  console.log(src + ' -> ' + dest + ' (' + (o/1024).toFixed(0) + 'KB -> ' + (n/1024).toFixed(0) + 'KB)');
                  fs.unlinkSync(src);
                  converted++;
                } catch (e) {
                  console.warn('error:', src, e.message);
                }
              }
            }
            console.log('Done. converted=' + converted);
          })();
          EOF
          node convert-webp.js

      - name: Rebuild JSON data
        run: npm run build

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && echo "no changes" || git commit -m "auto: convert images to webp [skip ci]"
          git pull --rebase origin main
          git push
