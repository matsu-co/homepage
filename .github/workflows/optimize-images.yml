name: Optimize Images

on:
  push:
    branches:
      - main
    paths:
      - 'images/**.jpg'
      - 'images/**.jpeg'
      - 'images/**.png'
      - 'images/**.webp'
      - '*.jpg'
      - '*.jpeg'
      - '*.png'
      - '*.webp'
  workflow_dispatch:

jobs:
  build:
    name: calibreapp/image-actions
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Compress Images
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          jpegQuality: "90"
          pngQuality: "90"
          webpQuality: "90"
