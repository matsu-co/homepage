<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diary - matsushima CHIHIRO.</title>
  <link rel="stylesheet" href="../css/style.css">
 
  <style>
    /* 全体の横揺れを防ぐ設定 */
    html, body { overflow-x: hidden; width: 100%; margin: 0; padding: 0; }
    * { box-sizing: border-box; }

    /* 一覧のレイアウト */
    .diary-card { display: flex; gap: 20px; padding: 25px 0; text-decoration: none; color: inherit; }
    .diary-card-img { width: 120px; height: 90px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .diary-card-body { flex: 1; min-width: 0; }
    .diary-card-title { font-size: 1.1rem; margin: 5px 0; }
    .diary-card-excerpt { font-size: 0.9rem; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    /* 【超重要】詳細画面の画像ズレを直す設定 */
    .article-container { 
      width: 100%;
      max-width: 600px; 
      margin: 0 auto; 
      padding: 20px; /* 左右に余白を作る */
    }
    .article-container img { 
      display: block;
      width: 100%; /* 横幅いっぱいまで */
      max-width: 100%; /* 親要素を超えない */
      height: auto; /* 縦横比を保つ */
      margin: 30px auto; 
      border-radius: 4px;
    }

    .article-nav { display: flex; justify-content: space-between; margin-top: 40px; padding: 20px; border-top: 1px solid #eee; }
    .nav-link { text-decoration: none; color: #333; font-weight: bold; font-size: 0.9rem; max-width: 45%; }
    .nav-label { display: block; font-size: 0.7rem; color: #b0a898; margin-bottom: 5px; }
  /* タイトル：游ゴシック 太字 */
.diary-card-title,
#articleBody h2 {
  font-family: "游ゴシック体", "Yu Gothic", YuGothic, sans-serif;
  font-weight: bold;
}

/* 本文・日付：游ゴシック 細め */
.diary-card-excerpt,
#articleBody p,
.diary-card-body > div {
  font-family: "游ゴシック体", "Yu Gothic", YuGothic, sans-serif;
  font-weight: 300;
  line-height: 2;
}

  </style>
</head>
<body>
  <div class="paper-bg"><img src="../paper.png" alt="" class="paper-texture"></div>
  <div class="page-wrapper">
    <header class="page-header">
      <h1>diary</h1>
      <a href="../" class="back-link" id="backLink">← もどる</a>
    </header>

    <div id="diaryEntries"></div>

    <div class="article-content" id="diaryArticle" style="display:none;">
      <div class="article-container" id="articleBody"></div>
      <nav class="article-nav">
        <a id="prevLink" class="nav-link" style="visibility:hidden;"><span class="nav-label">← 前</span><span id="prevTitle"></span></a>
        <a id="nextLink" class="nav-link" style="visibility:hidden; text-align:right;"><span class="nav-label">次 →</span><span id="nextTitle"></span></a>
      </nav>
    </div>
    <footer class="page-footer">&copy; matsushima CHIHIRO.</footer>
  </div>

  <script src="../js/layout.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      const entriesEl = document.getElementById('diaryEntries');
      const articleEl = document.getElementById('diaryArticle');
      const backLink = document.getElementById('backLink');

      // 焼き付けたデータを読み込む（これで詳細も爆速になります！）
      const response = await fetch('../diary-data.json');
      const data = await response.json();
      const entries = data.entries || [];

      if (pageId) {
        entriesEl.style.display = 'none';
        articleEl.style.display = 'block';
        backLink.href = './';

        const idx = entries.findIndex(e => e.id === pageId);
        const entry = entries[idx];

        if (entry) {
          // 前後のリンク設定
          if (idx < entries.length - 1) {
            const prev = entries[idx + 1];
            const pLink = document.getElementById('prevLink');
            pLink.style.visibility = 'visible'; pLink.href = `?id=${prev.id}`;
            document.getElementById('prevTitle').innerText = prev.title;
          }
          if (idx > 0) {
            const next = entries[idx - 1];
            const nLink = document.getElementById('nextLink');
            nLink.style.visibility = 'visible'; nLink.href = `?id=${next.id}`;
            document.getElementById('nextTitle').innerText = next.title;
          }

          // 本文を表示（すでに焼き付けてあるデータを使うので爆速！）
          const articleBody = document.getElementById('articleBody');
          articleBody.innerHTML = `<h2>${entry.title}</h2><p style="color:#b0a898;">${entry.date}</p>` + (entry.htmlContent || '');
        }
      } else {
        entries.forEach(entry => {
          const card = document.createElement('a');
          card.href = `?id=${entry.id}`;
          card.className = 'diary-card';
          card.innerHTML = `
            ${entry.thumbnail ? `<img src="${entry.thumbnail}" class="diary-card-img">` : ''}
            <div class="diary-card-body">
              <div style="font-size:0.8rem;color:#b0a898">${entry.date}</div>
              <h3 class="diary-card-title">${entry.title}</h3>
              <p class="diary-card-excerpt">${entry.description}</p>
            </div>`;
          entriesEl.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
