<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>diary - matsushima CHIHIRO.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 一覧の「3行で…」の魔法 */
    .diary-card-excerpt {
      display: -webkit-box;
      -webkit-line-clamp: 3; /* 3行で制限 */
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 0.9rem;
      color: #666;
      margin-top: 8px;
    }

    /* 詳細画面の画像を「爆速」かつ「綺麗に」表示する設定 */
    .article-container img {
      width: 100%;
      max-width: 600px; /* 大きすぎないように制限 */
      height: auto;
      display: block;
      margin: 30px auto;
      border-radius: 4px;
      /* 読み込みを軽く感じさせる工夫 */
      content-visibility: auto; 
    }

    /* 記事詳細の縦スクロールを読みやすく */
    .article-container {
      max-width: 640px;
      margin: 0 auto;
      padding-bottom: 100px;
      line-height: 2;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="paper-bg"><img src="../paper.png" alt="" class="paper-texture"></div>

  <div class="page-wrapper">
    <header class="page-header">
      <h1>diary</h1>
      <a href="../" class="back-link" id="backLink">← もどる</a>
    </header>

    <div id="diaryEntries">
      <div class="loading" id="diaryLoading">読み込み中...</div>
    </div>

    <div class="article-content" id="diaryArticle" style="display:none;">
      <div class="article-container" id="articleBody"></div>
      <nav class="article-nav" style="display:flex; justify-content:space-between; margin-top:50px; border-top:1px solid #eee; padding-top:20px;">
        <a id="prevLink" class="nav-link" style="visibility:hidden; color:#b0a898; text-decoration:none;">← 前の記事</a>
        <a id="nextLink" class="nav-link" style="visibility:hidden; color:#b0a898; text-decoration:none; text-align:right;">次の記事 →</a>
      </nav>
    </div>

    <footer class="page-footer">&copy; matsushima CHIHIRO.</footer>
  </div>

  <script src="../js/main.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      const entriesEl = document.getElementById('diaryEntries');
      const articleEl = document.getElementById('diaryArticle');
      const backLink = document.getElementById('backLink');

      const response = await fetch('../diary-data.json');
      const data = await response.json();
      const entries = data.entries || [];

      if (pageId) {
        // --- 記事詳細表示 ---
        entriesEl.style.display = 'none';
        articleEl.style.display = 'block';
        
        // 【修正】詳細のときは「diary一覧」に戻るように
        backLink.href = './'; 

        const currentIndex = entries.findIndex(e => e.id === pageId);
        if (currentIndex !== -1) {
          if (currentIndex < entries.length - 1) {
            const next = entries[currentIndex + 1];
            const nextEl = document.getElementById('nextLink');
            nextEl.style.visibility = 'visible';
            nextEl.href = `?id=${next.id}`;
          }
          if (currentIndex > 0) {
            const prev = entries[currentIndex - 1];
            const prevEl = document.getElementById('prevLink');
            prevEl.style.visibility = 'visible';
            prevEl.href = `?id=${prev.id}`;
          }
        }

        const articleBody = document.getElementById('articleBody');
        const content = await NotionHelper.getEntry(pageId);
        if (content && content.blocks) {
          articleBody.innerHTML = `<h2>${content.title}</h2><p style="color:#b0a898; font-size:0.8rem;">${content.date || ''}</p>` + NotionHelper.blocksToHtml(content.blocks);
        }
      } else {
        // --- 一覧表示 ---
        document.getElementById('diaryLoading').style.display = 'none';
        entries.forEach(entry => {
          const card = document.createElement('a');
          card.href = `?id=${entry.id}`;
          card.className = 'diary-card';
          card.innerHTML = `
            ${entry.thumbnail ? `<img src="${entry.thumbnail}" class="diary-card-img">` : ''}
            <div class="diary-card-body">
              <div class="diary-card-date">${entry.date}</div>
              <h3 class="diary-card-title">${entry.title}</h3>
              <p class="diary-card-excerpt">${entry.description}</p>
            </div>
          `;
          entriesEl.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
