<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>photo - matsushima CHIHIRO.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .photo-hero {
      width: 100%;
      max-height: 50vh;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
      cursor: zoom-in;
    }
/* 左サイドバー＋メインの横並びレイアウト */
.photo-body {
  display: flex;
  gap: 40px;
  align-items: flex-start;
}

/* 左：フィルター縦並び */
.season-filter {
  width: 72px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  padding-top: 4px;
}
.year-group {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
}
.year-label {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.75rem;
  color: #7a7060;
  letter-spacing: 0.04em;
  margin-bottom: 4px;
  margin-top: 2px;
}
.year-divider {
  width: 100%;
  border: none;
  border-top: 1px solid #d4cbbf;
  margin: 10px 0 8px;
}
.season-btn {
  font-family: 'Shippori Mincho', serif;
  font-size: 0.82rem;
  border: none;
  background: none;
  color: #b0a090;
  cursor: pointer;
  padding: 2px 0;
  letter-spacing: 0.06em;
  transition: color 0.2s;
  text-align: left;
}
.season-btn:hover { color: #5a5040; }
.season-btn.active { color: #4a4235; border-bottom: 1px solid #c0b090; }

/* 右：グリッド（中央寄せ） */
.photo-grid-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
}
.photo-grid {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.photo-item { overflow: hidden; cursor: zoom-in; }
.photo-item img { width: 100%; height: auto; object-fit: cover; display: block; transition: opacity 0.3s; border-radius: 0; }
.photo-item:hover img { opacity: 0.88; }

/* モバイル：縦積みに */
@media (max-width: 600px) {
  .photo-body { flex-direction: column; gap: 20px; }
  .season-filter { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 8px; }
  .year-group { flex-direction: row; flex-wrap: wrap; gap: 4px; align-items: center; }
  .year-divider { display: none; }
}
.photo-item:hover img { opacity: 0.85; }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(20, 18, 15, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 2rem;
      color: #f0ece4;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      padding: 8px;
    }
    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="paper-bg">
    <img src="../paper.png" alt="" class="paper-texture">
  </div>

  <div class="page-wrapper" style="max-width: 960px; position: relative; z-index: 1;">
    <header class="page-header">
      <h1>photo</h1>
      <a href="../" class="back-link">← もどる</a>
    </header>

    <img id="heroImg" class="photo-hero" src="../images/phototop.png" alt="">
    <div class="photo-body">
  <aside class="season-filter" id="seasonFilter"></aside>
  <div class="photo-grid-wrap">
    <div class="photo-grid" id="photoGrid"></div>
  </div>
</div>

    <footer class="page-footer"></footer>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightboxMedia" onclick="event.stopPropagation()"></div>
</div>

  <script>
    let allPhotos = [];

    async function loadPhotos() {
      try {
        const res = await fetch('../photo-data.json');
        const data = await res.json();
        allPhotos = data.photos || [];
        buildFilter();
        renderGrid(allPhotos);
      } catch (err) {
        console.error('読み込みエラー:', err);
      }
    }

    function buildFilter() {
  const labels = [...new Set(allPhotos.map(p => p.label))].filter(Boolean);
  const filter = document.getElementById('seasonFilter');
  if (labels.length === 0) { filter.style.display = 'none'; return; }

  // 年ごとにグループ化
  const byYear = {};
  const yearOrder = [];
  labels.forEach(l => {
    const year = l.split('｜')[0];
    if (!byYear[year]) { byYear[year] = []; yearOrder.push(year); }
    byYear[year].push(l);
  });

  let html = `<button class="season-btn active" onclick="setFilter(null, this)">すべて</button>`;
  yearOrder.forEach(year => {
    html += `<hr class="year-divider">`;
    html += `<div class="year-group"><div class="year-label">${year}</div>`;
    byYear[year].forEach(l => {
      const season = l.split('｜')[1];
      html += `<button class="season-btn" onclick="setFilter('${l}', this)">${season}</button>`;
    });
    html += `</div>`;
  });

  filter.innerHTML = html;
}

    function setFilter(label, btn) {
      document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderGrid(label ? allPhotos.filter(p => p.label === label) : allPhotos);
    }

    function renderGrid(photos) {
      const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  photos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'photo-item';
    if (/\.mp4$/i.test(p.src)) {
      div.innerHTML = `<video src="${p.src}" muted playsinline loop style="width:100%;height:100%;object-fit:cover;display:block;"></video>`;
      div.onclick = () => openLightbox(p.src, true);
    } else {
      div.innerHTML = `<img src="${p.src}" alt="" loading="lazy">`;
      div.onclick = () => openLightbox(p.src, false);
    }
    grid.appendChild(div);
  });
}

    function openLightbox(src, isVideo) {
  const media = document.getElementById('lightboxMedia');
  if (isVideo) {
    media.innerHTML = `<video src="${src}" controls autoplay playsinline style="max-width:92vw;max-height:92vh;object-fit:contain;"></video>`;
  } else {
    media.innerHTML = `<img src="${src}" alt="" style="max-width:92vw;max-height:92vh;object-fit:contain;">`;
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const media = document.getElementById('lightboxMedia');
  media.innerHTML = '';
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    loadPhotos();
  </script>

  <script src="../js/layout.js"></script>
</body>
</html>
