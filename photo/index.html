<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>photo - matsushima CHIHIRO.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .photo-hero {
      width: 100%;
      max-height: 70vh;
      object-fit: cover;
      display: block;
      margin-bottom: 32px;
      cursor: zoom-in;
    }
    .season-filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .season-filter::-webkit-scrollbar { display: none; }
    .season-btn {
      font-family: 'Shippori Mincho', serif;
      font-size: 0.8rem;
      border: 1px solid #d4cbbf;
      border-radius: 20px;
      padding: 5px 16px;
      background: none;
      color: #a08a6e;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.06em;
      transition: all 0.2s;
    }
    .season-btn:hover { background: #f0ede9; }
    .season-btn.active { background: #5a5040; color: #f5f0e8; border-color: #5a5040; }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    @media (max-width: 600px) {
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 3px; }
    }
    .photo-item { aspect-ratio: 1; overflow: hidden; cursor: zoom-in; }
    .photo-item img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.3s; }
    .photo-item:hover img { opacity: 0.85; }
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(20, 18, 15, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
      cursor: zoom-out;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img { max-width: 92vw; max-height: 92vh; object-fit: contain; }
    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 2rem;
      color: #f0ece4;
      cursor: pointer;
      background: none;
      border: none;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
      padding: 8px;
    }
    .lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="paper-bg">
    <img src="../paper.png" alt="" class="paper-texture">
  </div>

  <div class="page-wrapper" style="max-width: 960px; position: relative; z-index: 1;">
    <header class="page-header">
      <h1>photo</h1>
      <a href="../" class="back-link">← もどる</a>
    </header>

    <img id="heroImg" class="photo-hero" src="" alt="" style="display:none;">
    <div class="season-filter" id="seasonFilter"></div>
    <div class="photo-grid" id="photoGrid"></div>

    <footer class="page-footer"></footer>
  </div>

  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <div id="lightboxMedia" onclick="event.stopPropagation()"></div>
</div>

  <script>
    let allPhotos = [];

    async function loadPhotos() {
      try {
        const res = await fetch('../photo-data.json');
        const data = await res.json();
        allPhotos = data.photos || [];
        buildFilter();
        renderGrid(allPhotos);
        if (allPhotos.length > 0) {
          const hero = document.getElementById('heroImg');
          hero.src = allPhotos[allPhotos.length - 1].src;
          hero.style.display = 'block';
          hero.onclick = () => openLightbox(allPhotos[allPhotos.length - 1].src);
        }
      } catch (err) {
        console.error('読み込みエラー:', err);
      }
    }

    function buildFilter() {
      const labels = [...new Set(allPhotos.map(p => p.label))].filter(Boolean);
      const filter = document.getElementById('seasonFilter');
      if (labels.length === 0) { filter.style.display = 'none'; return; }
      filter.innerHTML =
        `<button class="season-btn active" onclick="setFilter(null, this)">すべて</button>` +
        labels.map(l => `<button class="season-btn" onclick="setFilter('${l}', this)">${l}</button>`).join('');
    }

    function setFilter(label, btn) {
      document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderGrid(label ? allPhotos.filter(p => p.label === label) : allPhotos);
    }

    function renderGrid(photos) {
      const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  photos.forEach(p => {
    const div = document.createElement('div');
    div.className = 'photo-item';
    if (/\.mp4$/i.test(p.src)) {
      div.innerHTML = `<video src="${p.src}" muted playsinline loop style="width:100%;height:100%;object-fit:cover;display:block;"></video>`;
      div.onclick = () => openLightbox(p.src, true);
    } else {
      div.innerHTML = `<img src="${p.src}" alt="" loading="lazy">`;
      div.onclick = () => openLightbox(p.src, false);
    }
    grid.appendChild(div);
  });
}

    function openLightbox(src, isVideo) {
  const media = document.getElementById('lightboxMedia');
  if (isVideo) {
    media.innerHTML = `<video src="${src}" controls autoplay playsinline style="max-width:92vw;max-height:92vh;object-fit:contain;"></video>`;
  } else {
    media.innerHTML = `<img src="${src}" alt="" style="max-width:92vw;max-height:92vh;object-fit:contain;">`;
  }
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  const media = document.getElementById('lightboxMedia');
  media.innerHTML = '';
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    loadPhotos();
  </script>

  <script src="../js/layout.js"></script>
</body>
</html>
