<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>work - matsu-co</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        /* スライダー専用の追加スタイル */
        .slider-outer { position: relative; width: 100%; overflow: hidden; margin-bottom: 20px; border-radius: 4px; }
        .slider-track { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .slider-item { flex: 0 0 100%; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.02); }
        .slider-item img { max-width: 100%; max-height: 65vh; object-fit: contain; }
        
        .slider-nav { display: flex; justify-content: center; gap: 15px; margin-top: 10px; align-items: center; }
        .nav-btn { background: #eee; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; color: #555; }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }
        .dots { display: flex; gap: 8px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; border: none; padding: 0; }
        .dot.active { background: #a08a6e; }
    </style>
</head>
<body class="bg-paper">
    <div class="paper-bg"><img src="../paper.png" alt="" class="paper-texture"></div>

    <div class="page-wrapper" style="max-width: 960px; position: relative; z-index: 1;">
        <header class="page-header">
            <h1>work</h1>
            <a href="../index.html" class="back-link">← もどる</a>
        </header>

        <main>
            <section class="work-section">
                <h2 class="section-title">work（お仕事）</h2>
                <div id="work-list" class="work-grid">読み込み中...</div>
            </section>
            <section class="work-section">
                <h2 class="section-title">Life work（くらしのデザイン）</h2>
                <div id="lifework-list" class="work-grid">読み込み中...</div>
            </section>
        </main>
        <footer class="page-footer">&copy; matsushima CHIHIRO.</footer>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="close-btn">&times;</button>
            
            <div class="slider-outer">
                <div id="modal-track" class="slider-track"></div>
            </div>
            
            <div id="slider-controls" class="slider-nav">
                <button id="prev-btn" class="nav-btn" onclick="moveSlider(-1)">←</button>
                <div id="modal-dots" class="dots"></div>
                <button id="next-btn" class="nav-btn" onclick="moveSlider(1)">→</button>
            </div>

            <div class="modal-info">
                <h2 id="modal-title" style="margin-top:20px;"></h2>
                <p id="modal-description" style="white-space: pre-wrap;"></p>
                <div id="modal-tags" class="work-modal-tags" style="justify-content:center;"></div>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      
      // 千裕さんのHTMLにある「名前（ID）」を正確に指定しています
      const grid = document.getElementById('workGrid');
      const detail = document.getElementById('workDetail');
      const loading = document.getElementById('workLoading');
      const detailBody = document.getElementById('detailBody');
      const backLink = document.getElementById('backLink');

      try {
        // Vercelが焼いた「最新の爆速データ」を取りに行きます
        const response = await fetch('../work-data.json');
        if (!response.ok) throw new Error('data missing');
        const data = await response.json();
        const entries = data.entries || [];

        if (pageId) {
          // --- 【詳細表示モード】 ---
          grid.style.display = 'none';
          detail.style.display = 'block';
          if (backLink) backLink.href = './'; // 詳細のときは一覧に戻る設定

          // 保存されたデータの中から、該当するお仕事を探します
          const entry = entries.find(e => e.id === pageId);
          if (entry && entry.contentBlocks) {
            // 保存済みの本文（blocks）をHTMLに変換して表示！
            const contentHtml = NotionHelper.blocksToHtml(entry.contentBlocks);
            detailBody.innerHTML = `<h2>${entry.title}</h2>` + contentHtml;
          } else {
            detailBody.innerHTML = '<p>詳細データが見つかりません。もう一度「反映ボタン」を押してみてください。</p>';
          }
        } else {
          // --- 【一覧表示モード】 ---
          if (loading) loading.style.display = 'none';
          entries.forEach(entry => {
            const card = document.createElement('a');
            card.href = `?id=${entry.id}`;
            card.className = 'work-card';
            // Description（説明文）を優先して表示するように戻しました
            card.innerHTML = `
              <img src="${entry.thumbnail}" alt="" loading="lazy">
              <h3>${entry.title}</h3>
              <p>${entry.description || ''}</p>
            `;
            grid.appendChild(card);
          });
        }
      } catch (err) {
        console.error('読み込み失敗:', err);
        if (loading) loading.innerText = 'お仕事の読み込みに失敗しました。';
      }
    })();
  </script>
</body>
</html>
