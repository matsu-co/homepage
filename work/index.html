<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>work - matsu-co</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="bg-paper">
    <div class="paper-bg">
        <img src="../paper.png" alt="" class="paper-texture">
    </div>

    <div class="page-wrapper" style="max-width: 960px; position: relative; z-index: 1;">
        <header class="page-header">
            <h1>work</h1>
            <a href="../index.html" class="back-link">← もどる</a>
        </header>

        <main>
            <section class="work-section">
                <h2 class="section-title">work（お仕事）</h2>
                <div id="work-list" class="work-grid">読み込み中...</div>
            </section>

            <section class="work-section">
                <h2 class="section-title">Life work（くらしのデザイン）</h2>
                <div id="lifework-list" class="work-grid">読み込み中...</div>
            </section>
        </main>

        <footer class="page-footer">
            &copy; matsushima CHIHIRO.
        </footer>
    </div>

    <div id="modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button onclick="closeModal()" class="close-btn" aria-label="閉じる">&times;</button>
            <div id="modal-images" class="modal-images">
                </div>
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <p id="modal-description" style="white-space: pre-wrap;"></p>
                <div id="modal-tags" class="work-modal-tags"></div>
            </div>
        </div>
    </div>

    <script>
        async function loadWork() {
            try {
                // api/notion.js を呼び出す
                const res = await fetch('/api/notion?type=work');
                const data = await res.json();
                
                if (data.error) {
                    document.getElementById('work-list').innerHTML = `<p style="color:red">Error: ${data.error}</p>`;
                    return;
                }

                const wList = document.getElementById('work-list');
                const lList = document.getElementById('lifework-list');
                wList.innerHTML = '';
                lList.innerHTML = '';

                data.entries.forEach(e => {
                    const div = document.createElement('div');
                    div.className = 'work-card';
                    
                    // クリックでモーダルを開く設定
                    div.onclick = () => {
                        // 画像をすべて縦に並べて表示（スライダーよりスマホで見やすい）
                        document.getElementById('modal-images').innerHTML = 
                            e.images.map(url => `<img src="${url}" loading="lazy">`).join('');
                        
                        document.getElementById('modal-title').innerText = e.title;
                        document.getElementById('modal-description').innerText = e.description;
                        
                        // タグの表示
                        const tagContainer = document.getElementById('modal-tags');
                        tagContainer.innerHTML = (e.tags || []).map(t => `<span class="work-tag">${t}</span>`).join('');
                        
                        document.getElementById('modal').style.display = 'block';
                        document.body.style.overflow = 'hidden'; // 背景スクロールを止める
                    };

                    // カードの中身（枠を揃える thumbnail-container を使用）
                    div.innerHTML = `
                        <div class="work-thumbnail-container">
                            <img src="${e.thumbnail}" alt="${e.title}" loading="lazy">
                        </div>
                        <p>${e.title}</p>
                    `;

                    // カテゴリで振り分け
                    if (e.category.toLowerCase().includes('life')) {
                        lList.appendChild(div);
                    } else {
                        wList.appendChild(div);
                    }
                });
            } catch (e) {
                console.error("Fetch error:", e);
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = ''; // スクロール再開
        }

        // ページを開いた時にデータを読み込む
        loadWork();
    </script>
</body>
</html>
