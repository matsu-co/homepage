<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>work - matsushima CHIHIRO.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 確実に表示するための最低限のスタイル */
    .work-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; padding: 20px 0; }
    .work-card { text-decoration: none; color: inherit; border: 1px solid #eee; border-radius: 8px; overflow: hidden; background: white; transition: transform 0.2s; }
    .work-card:hover { transform: translateY(-5px); }
    .work-card img { width: 100%; height: 200px; object-fit: cover; }
    .work-card-info { padding: 15px; }
    .work-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
    .work-card p { font-size: 0.9rem; color: #666; margin: 0; }
    
    .loading { text-align: center; padding: 50px; color: #b0a898; }
    .detail-content { max-width: 800px; margin: 0 auto; padding: 20px; }
    .detail-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="paper-bg"><img src="../paper.png" alt="" class="paper-texture"></div>

  <div class="page-wrapper">
    <header class="page-header">
      <h1>work</h1>
      <a href="../" class="back-link" id="backLink">← もどる</a>
    </header>

    <div class="work-grid" id="workGrid">
      <div class="loading" id="workLoading">読み込み中...</div>
    </div>

    <div id="workDetail" style="display:none;">
      <div class="detail-content" id="detailBody"></div>
    </div>

    <footer class="page-footer">&copy; matsushima CHIHIRO.</footer>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      const grid = document.getElementById('workGrid');
      const detail = document.getElementById('workDetail');
      const loading = document.getElementById('workLoading');
      const detailBody = document.getElementById('detailBody');
      const backLink = document.getElementById('backLink');

      try {
        // データの取得
        const response = await fetch('../work-data.json');
        if (!response.ok) throw new Error('データが見つかりません');
        const data = await response.json();
        const entries = data.entries || [];

        // 読み込み中を消す
        if (loading) loading.style.display = 'none';

        if (pageId) {
          // --- 詳細表示 ---
          grid.style.display = 'none';
          detail.style.display = 'block';
          if (backLink) backLink.href = './';

          const entry = entries.find(e => e.id === pageId);
          if (entry) {
            let html = `<h2>${entry.title}</h2>`;
            // 本文(blocks)を簡易的にHTMLへ変換
            if (entry.contentBlocks) {
              entry.contentBlocks.forEach(block => {
                if (block.type === 'paragraph') {
                  const text = block.paragraph.rich_text?.[0]?.plain_text || '';
                  html += `<p>${text}</p>`;
                } else if (block.type === 'image') {
                  const url = block.image.file?.url || block.image.external?.url;
                  html += `<img src="${url}" alt="">`;
                }
              });
            }
            detailBody.innerHTML = html;
          }
        } else {
          // --- 一覧表示 ---
          entries.forEach(entry => {
            const card = document.createElement('a');
            card.href = `?id=${entry.id}`;
            card.className = 'work-card';
            card.innerHTML = `
              <img src="${entry.thumbnail}" alt="">
              <div class="work-card-info">
                <h3>${entry.title}</h3>
                <p>${entry.description || ''}</p>
              </div>
            `;
            grid.appendChild(card);
          });
        }
      } catch (err) {
        console.error('Error:', err);
        if (loading) loading.innerText = '読み込みに失敗しました。ページを更新してみてください。';
      }
    })();
  </script>
</body>
</html>
