<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact - matsushima CHIHIRO.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .contact-intro {
      font-size: 0.95rem;
      color: #7a7060;
      line-height: 2;
      margin-bottom: 40px;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 0.85rem;
      color: #a08a6e;
      letter-spacing: 0.1em;
    }

    .form-group input,
    .form-group textarea {
      background: rgba(255, 255, 252, 0.7);
      border: 1px solid #d4cbbf;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Shippori Mincho', serif;
      font-size: 1rem;
      color: #4a4235;
      outline: none;
      transition: border-color 0.3s ease;
      width: 100%;
      box-sizing: border-box;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #a08a6e;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 160px;
      line-height: 1.8;
    }

    .submit-btn {
      align-self: flex-start;
      background: none;
      border: 1px solid #a08a6e;
      border-radius: 24px;
      padding: 10px 32px;
      font-family: 'Shippori Mincho', serif;
      font-size: 0.95rem;
      color: #5a5040;
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: background 0.3s ease, color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submit-btn:hover {
      background: #a08a6e;
      color: #f5f0e8;
    }

    .submit-btn .plane {
      font-size: 1.1rem;
      transition: transform 0.3s ease;
    }

    .submit-btn:hover .plane {
      transform: translateX(6px) translateY(-3px);
    }

    .success-msg {
      display: none;
      background: rgba(255, 255, 252, 0.8);
      border: 1px solid #d4cbbf;
      border-radius: 10px;
      padding: 32px;
      text-align: center;
      color: #5a5040;
      line-height: 2;
    }

    .success-msg .big {
      font-size: 2rem;
      display: block;
      margin-bottom: 12px;
    }

    .error-msg {
      display: none;
      font-size: 0.85rem;
      color: #c0806e;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="paper-bg">
    <img src="../paper.png" alt="" class="paper-texture">
  </div>

  <div class="page-wrapper">
    <header class="page-header">
      <h1>contact</h1>
      <a href="../" class="back-link">← もどる</a>
    </header>

    <p class="contact-intro">
      なにかことばが浮かんだら<br>
      メッセージとお名前を書いて、窓から紙ヒコーキを飛ばすように、
      
      ひょいと自由にお気軽に手紙をください。
    </p>

    <form class="contact-form" id="contactForm">
      <div class="form-group">
        <label for="name">お名前</label>
        <input type="text" id="name" name="" placeholder="" required>
      </div>
      <div class="form-group">
        <label for="message">メッセージ</label>
        <textarea id="message" name="message" placeholder="" required></textarea>
      </div>
      <p class="error-msg" id="errorMsg">送信できませんでした。しばらくしてから再度お試しください。</p>
      <button type="submit" class="submit-btn">
        <span class="plane">✈</span> 飛ばす
      </button>
    </form>

    <div class="success-msg" id="successMsg">
      <span class="big">✈</span>
      いま、どこかの空をとんでいます。
      
      たいせつに受け取ります。ありがとうございます。
    </div>

    <footer class="page-footer"></footer>
  </div>

  <script>
    const form = document.getElementById('contactForm');
    const successMsg = document.getElementById('successMsg');
    const errorMsg = document.getElementById('errorMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';

      const btn = form.querySelector('.submit-btn');
      btn.disabled = true;
      btn.textContent = '送信中…';

      try {
        const response = await fetch('https://formspree.io/f/mlgajyjg', {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
        } else {
          throw new Error('送信失敗');
        }
      } catch {
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<span class="plane">✈</span> 飛ばす';
      }
    });
  </script>

  <script src="../js/layout.js"></script>
</body>
</html>
