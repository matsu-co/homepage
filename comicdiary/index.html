<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comic diary - matsushima CHIHIRO.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="paper-bg">
    <img src="../paper.png" alt="" class="paper-texture">
  </div>

  <div class="page-wrapper">
    <header class="page-header">
      <h1>comic diary</h1>
      <a href="../" class="back-link">← もどる</a>
    </header>

    <!-- 記事一覧 -->
    <div class="entries" id="comicEntries">
      <div class="loading" id="comicLoading">読み込み中</div>
    </div>

    <!-- 記事詳細（動的表示） -->
    <div class="article-content" id="comicArticle" style="display:none;"></div>

    <footer class="page-footer">
      &copy; matsushima CHIHIRO.
    </footer>
  </div>

  <script>
  (async () => {
    const grid = document.getElementById('comicGrid');
    const loading = document.getElementById('comicLoading');

    try {
      // 自分のフォルダから焼かれた爆速データを読み込む
      const response = await fetch('../comic-data.json');
      const data = await response.json();
      const entries = data.entries || [];

      if (loading) loading.style.display = 'none';

      entries.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'comic-card';
        // 画像は /public/images/comic/ の中から直接出します
        div.innerHTML = `
          <img src="${entry.thumbnail}" alt="${entry.title}" style="width:100%; height:auto;">
          <h3>${entry.title}</h3>
          <p style="font-size:0.8rem; color:#666;">${entry.description}</p>
        `;
        grid.appendChild(div);
      });
    } catch (err) {
      console.error(err);
    }
  })();
</script>
</body>
</html>
