<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comicdiary - matsushima CHIHIRO.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 2列デザイン（PCもスマホも） */
    .comic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 0; }
    .comic-card { text-decoration: none; color: inherit; position: relative; }
    .comic-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 4px; }
    .comic-info { margin-top: 5px; font-size: 0.8rem; }
    .serial-no { font-weight: bold; color: #a08a6e; margin-right: 5px; }
    .tag-labels { display: flex; gap: 5px; margin-top: 3px; flex-wrap: wrap; }
    .tag-label { background: #f0ede9; color: #888; padding: 1px 6px; border-radius: 10px; font-size: 0.7rem; }

    /* タグフィルターのボタン */
    .tag-filter-container { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; }
    .filter-btn { border: 1px solid #e0ddd5; background: white; padding: 5px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: #a08a6e; color: white; border-color: #a08a6e; }

    /* 詳細：縦スクロール表示 */
    .article-images { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }
    .article-images img { width: 100%; height: auto; }
    
    /* 前後ナビゲーション */
    .post-nav { display: flex; justify-content: space-between; padding: 40px 0; border-top: 1px solid #e0ddd5; }
    .nav-arrow { text-decoration: none; color: #a08a6e; font-weight: bold; }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header class="page-header">
      <h1>comicdiary</h1>
      <a href="../" class="back-link" id="backLink">← もどる</a>
    </header>

    <div id="filterArea" class="tag-filter-container"></div>
    <div id="comicGrid" class="comic-grid"></div>
    
    <div id="comicDetail" style="display:none;">
      <div class="article-container">
        <div id="detailImages" class="article-images"></div>
        <div id="detailText" class="article-body"></div>
        <nav class="post-nav">
          <a id="prevPost" class="nav-arrow" href="#">← 前へ</a>
          <a id="nextPost" class="nav-arrow" href="#">次へ →</a>
        </nav>
      </div>
    </div>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      const currentTag = params.get('tag');
      
      const response = await fetch('../comic-data.json');
      const data = await response.json();
      const entries = data.entries || [];

      // --- タグボタンの生成 ---
      const allTags = [...new Set(entries.flatMap(e => e.tags))];
      const filterArea = document.getElementById('filterArea');
      filterArea.innerHTML = `<button class="filter-btn ${!currentTag?'active':''}" onclick="location.href='./'">すべて</button>` + 
        allTags.map(tag => `<button class="filter-btn ${currentTag===tag?'active':''}" onclick="location.href='?tag=${tag}'">${tag}</button>`).join('');

      if (pageId) {
        // --- 詳細表示 ---
        document.getElementById('comicGrid').style.display = 'none';
        document.getElementById('filterArea').style.display = 'none';
        document.getElementById('comicDetail').style.display = 'block';
        
        const idx = entries.findIndex(e => e.id === pageId);
        const entry = entries[idx];
        
        document.getElementById('detailImages').innerHTML = entry.images.map(src => `<img src="${src}">`).join('');
        document.getElementById('detailText').innerHTML = `<h3>${entry.serial} ${entry.title}</h3><p>${entry.description}</p>`;
        
        // 前後ナビのリンク設定
        const prev = entries[idx + 1];
        const next = entries[idx - 1];
        const prevBtn = document.getElementById('prevPost');
        const nextBtn = document.getElementById('nextPost');
        
        if (prev) { prevBtn.href = `?id=${prev.id}`; } else { prevBtn.style.visibility = 'hidden'; }
        if (next) { nextBtn.href = `?id=${next.id}`; } else { nextBtn.style.visibility = 'hidden'; }
        
      } else {
        // --- 一覧表示 ---
        const filtered = currentTag ? entries.filter(e => e.tags.includes(currentTag)) : entries;
        const grid = document.getElementById('comicGrid');
        
        filtered.forEach(entry => {
          const card = document.createElement('a');
          card.href = `?id=${entry.id}`;
          card.className = 'comic-card';
          card.innerHTML = `
            <img src="${entry.thumbnail}" loading="lazy">
            <div class="comic-info">
              <span class="serial-no">${entry.serial}</span>
              <div class="tag-labels">${entry.tags.map(t => `<span class="tag-label">${t}</span>`).join('')}</div>
            </div>
          `;
          grid.appendChild(card);
        });
      }
    })();
  </script>
</body>
</html>
