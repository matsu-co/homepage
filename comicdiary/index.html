<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comicdiary - matsushima CHIHIRO.</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* 【修正】ヘッダーの赤いロゴ(01)：前回のサイズを維持 (180px) */
    .header-logo { width: 200px; height: auto; margin-bottom: 15px; display: block; }
    
    /* 一覧：2列デザイン */
    .comic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px 0; }
    .comic-card { text-decoration: none; color: #5c5446; display: block; }
    .comic-card img { width: 100%; aspect-ratio: 1 / 1; object-fit: cover; border-radius: 2px; }
    .comic-info { margin-top: 8px; font-size: 0.85rem; line-height: 1.4; }
    .serial-no { font-weight: bold; margin-right: 4px; color: #a08a6e; }

    /* 【修正】タグのスタイル：リンクとしても使えるようにtext-decoration等を調整 */
    .tag-label { 
      background: #f0ede9; color: #888; padding: 2px 10px; border-radius: 15px; 
      font-size: 0.75rem; margin-right: 5px; display: inline-block;
      text-decoration: none; /* リンクの線を消す */
      cursor: pointer; /* マウスオーバーで指マークに */
      transition: background 0.2s; /* ホバー時のアニメーション */
    }
    .tag-label:hover { background: #e0ddd5; color: #5c5446; } /* ホバー時の色 */

    /* タグフィルター（上部） */
    .tag-filter-container { display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 20px; border-bottom: 1px solid #f0ede9; margin-bottom: 10px; }
    .filter-btn { border: 1px solid #e0ddd5; background: white; padding: 4px 12px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; color: #888; white-space: nowrap; }
    .filter-btn.active { border-color: #a08a6e; color: #a08a6e; }

    /* 詳細：シリアル・タイトル → 画像 → 本文 → タグ */
    .detail-header { margin-bottom: 30px; text-align: center; }
    .detail-title { font-size: 1.3rem; font-family: 'Shippori Mincho', serif; color: #5c5446; margin: 0; }
    .detail-serial { display: block; font-size: 1rem; color: #a08a6e; font-weight: bold; margin-bottom: 8px; }
    .article-images { display: flex; flex-direction: column; gap: 20px; margin: 30px 0; }
    .article-images img { width: 100%; height: auto; border-radius: 2px; }
    .article-body { line-height: 2; color: #444; white-space: pre-wrap; padding: 0 10px; font-size: 1rem; }
    
    /* 【修正】フッター：手書き名(02)を少し大きく調整 (130px -> 180px) */
    .handwritten-footer { width: 180px; height: auto; margin: 80px auto 40px; display: block; }
    
    /* 【修正】薄い罫線(border-top)を消去、茶色罫線のみに */
    .post-nav { display: flex; justify-content: space-between; padding: 40px 0; margin-top: 40px; }
    .nav-arrow { text-decoration: none; color: #a08a6e; font-size: 0.95rem; font-weight: bold; }
  </style>
</head>
<body>
  <div class="page-wrapper" style="max-width: 800px; margin: 0 auto; padding: 20px;">
   <header class="page-header">
  <h1>comicdiary</h1>
</header>
<a href="./" class="back-link" id="backLink" style="text-decoration: none; color: #b0a898; font-size: 1rem; display: none; margin-bottom: 20px;">← 一覧にもどる</a>

    <main>
      <div id="filterArea" class="tag-filter-container"></div>
      <div id="comicGrid" class="comic-grid"></div>
      
      <div id="comicDetail" style="display:none;">
        <article class="article-container">
          <div class="detail-header">
            <span id="detailSerial" class="detail-serial"></span>
            <h2 id="detailTitle" class="detail-title"></h2>
          </div>
          <div id="detailImages" class="article-images"></div>
          
          <div id="detailText" class="article-body"></div>
          
          <div id="detailTags" style="margin-top: 30px; padding: 0 10px; display: flex;"></div>
          
          <nav class="post-nav">
            <a id="prevPost" class="nav-arrow" href="#">← 前の投稿</a>
            <a id="nextPost" class="nav-arrow" href="#">次の投稿 →</a>
          </nav>
        </article>
      </div>
    </main>

    <footer class="page-footer"></footer>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const pageId = params.get('id');
      const currentTag = params.get('tag');
      
      const response = await fetch('../comic-data.json');
      const data = await response.json();
      const entries = data.entries || [];

      const allTags = [...new Set(entries.flatMap(e => e.tags || []))].filter(Boolean);
      const filterArea = document.getElementById('filterArea');
      if (allTags.length > 0) {
        filterArea.innerHTML = `<button class="filter-btn ${!currentTag?'active':''}" onclick="location.href='./'">すべて</button>` + 
          allTags.map(tag => `<button class="filter-btn ${currentTag===tag?'active':''}" onclick="location.href='?tag=${tag}'">${tag}</button>`).join('');
      } else {
        filterArea.style.display = 'none';
      }

      if (pageId) {
        document.getElementById('comicGrid').style.display = 'none';
        document.getElementById('filterArea').style.display = 'none';
        document.getElementById('comicDetail').style.display = 'block';
        document.getElementById('backLink').style.display = 'inline';
        
        const idx = entries.findIndex(e => e.id === pageId);
        const entry = entries[idx];
        
        if (entry) {
          document.getElementById('detailSerial').innerText = entry.serial;
          document.getElementById('detailTitle').innerText = entry.title;
          document.getElementById('detailImages').innerHTML = entry.images.map(src => `<img src="${src}" loading="lazy">`).join('');
          document.getElementById('detailText').innerText = entry.description;
          
          // 【修正】タグを表示（テキストの下・クリック可能に）
          if (entry.tags && entry.tags.length > 0) {
            // 単なるspanではなく、リンク(<a>)に変更し、一覧と同じフィルタが効くようにしました
            document.getElementById('detailTags').innerHTML = entry.tags.map(t => `<a href="./?tag=${encodeURIComponent(t)}" class="tag-label">${t}</a>`).join('');
          } else {
            document.getElementById('detailTags').innerHTML = '';
          }

          const prev = entries[idx + 1];
          const next = entries[idx - 1];
          const prevBtn = document.getElementById('prevPost');
          const nextBtn = document.getElementById('nextPost');
          if (prev) { prevBtn.href = `?id=${prev.id}`; } else { prevBtn.style.visibility = 'hidden'; }
          if (next) { nextBtn.href = `?id=${next.id}`; } else { nextBtn.style.visibility = 'hidden'; }
        }
      } else {
        const filtered = currentTag ? entries.filter(e => e.tags.includes(currentTag)) : entries;
        const grid = document.getElementById('comicGrid');
        filtered.forEach(entry => {
          const card = document.createElement('a');
          card.href = `?id=${entry.id}`;
          card.className = 'comic-card';
          card.innerHTML = `
            <img src="${entry.thumbnail}" loading="lazy">
            <div class="comic-info">
              <span class="serial-no">${entry.serial}</span>
              <span class="comic-title">${entry.title}</span>
            </div>
          `;
          grid.appendChild(card);
        });
      }
    })();
 </script>

  <script src="../js/layout.js"></script>

</body>
</html>
