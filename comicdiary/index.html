<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>comicdiary - matsushima CHIHIRO.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600&display=swap"></noscript>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* スライダー */
    .slider-outer { position: relative; width: 100%; overflow: hidden; margin-bottom: 20px; }
    .slider-track { display: flex; transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .slider-item { flex: 0 0 100%; display: flex; align-items: center; justify-content: center; }
    .slider-item img { max-width: 100%; max-height: 65vh; object-fit: contain; border-radius: 0; }
    .slider-nav { display: flex; justify-content: center; gap: 15px; margin-top: 10px; align-items: center; }
    .nav-btn { background: #eee; border: none; padding: 5px 15px; border-radius: 20px; cursor: pointer; color: #555; font-family: inherit; }
    .dots { display: flex; gap: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; border: none; padding: 0; cursor: pointer; }
    .dot.active { background: #a08a6e; }

    /* タグ */
    .tag-label {
      background: #f0ede9; color: #888; padding: 2px 10px; border-radius: 15px;
      font-size: 0.75rem; margin-right: 5px; display: inline-block;
      cursor: pointer; transition: background 0.2s; border: 1px solid transparent;
    }
    .tag-label:hover { background: #e0ddd5; color: #5c5446; }
    .tag-label.active { border-color: #a08a6e; color: #a08a6e; background: #faf7f3; }

    /* タグフィルターバー */
    .tag-filter-container {
      display: flex; gap: 8px; overflow-x: auto; padding: 10px 0 20px;
      margin-bottom: 24px; scrollbar-width: none;
    }
    .tag-filter-container::-webkit-scrollbar { display: none; }
    .filter-btn {
      border: 1px solid #e0ddd5; background: white; padding: 4px 14px;
      border-radius: 15px; cursor: pointer; font-size: 0.8rem; color: #888;
      white-space: nowrap; font-family: inherit; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #c0b09e; color: #5c5446; }
    .filter-btn.active { border-color: #a08a6e; color: #a08a6e; background: #faf7f3; }

    /* カードタグ */
    .card-tags { margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; }

    /* モーダルタグ */
    .modal-tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 16px; }

    /* 一覧にもどるボタン */
    .modal-back-btn {
      display: block; margin: 32px auto 8px; background: none;
      border: 1px solid #a08a6e; border-radius: 24px; padding: 10px 32px;
      font-family: 'Shippori Mincho', serif; font-size: 0.9rem; color: #5a5040;
      cursor: pointer; letter-spacing: 0.1em; transition: background 0.3s, color 0.3s;
    }
    .modal-back-btn:hover { background: #a08a6e; color: #f5f0e8; }
  </style>
</head>
<body>
  <div class="paper-bg">
    <img src="../paper.webp" alt="" class="paper-texture">
  </div>

  <div class="page-wrapper" style="max-width: 960px; position: relative; z-index: 1;">
    <header class="page-header">
      <h1>comicdiary</h1>
      <a href="../index.html" class="back-link">← もどる</a>
    </header>
    <main>
      <div id="filterArea" class="tag-filter-container"></div>
      <div id="comic-list" class="work-grid"></div>
    </main>
    <footer class="page-footer"></footer>
  </div>

  <!-- モーダル -->
  <div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <button onclick="closeModal()" class="close-btn" style="padding:12px; margin:-12px;">&times;</button>
      <div class="slider-outer">
        <div id="modal-track" class="slider-track"></div>
      </div>
      <div id="slider-controls" class="slider-nav">
        <button id="prev-btn" class="nav-btn" onclick="moveSlider(-1)">←</button>
        <div id="modal-dots" class="dots"></div>
        <button id="next-btn" class="nav-btn" onclick="moveSlider(1)">→</button>
      </div>
      <div class="modal-info">
        <p id="modal-serial" style="font-size:0.85rem; color:#a08a6e; margin-top:20px; margin-bottom:4px;"></p>
        <h2 id="modal-title" style="font-size:1.2rem; color:#4a4235; margin-bottom:12px;"></h2>
        <p id="modal-description" style="white-space:pre-wrap; font-size:0.95rem; color:#4a4235; line-height:1.9;"></p>
        <div id="modal-tags" class="modal-tags-row"></div>
        <button class="modal-back-btn" onclick="closeModal()">← 一覧にもどる</button>
      </div>
    </div>
  </div>

  <script>
    let currentIdx = 0;
    let imageCount = 0;
    let allEntries = [];
    let activeTag = null;

    async function loadComics() {
      try {
        const res = await fetch('../comic-data.json');
        const data = await res.json();
        allEntries = data.entries || [];
        buildFilterBar();
        renderCards();
      } catch (err) {
        console.error('読み込みエラー:', err);
      }
    }

    function buildFilterBar() {
      const allTags = [...new Set(allEntries.flatMap(e => e.tags || []))].filter(Boolean);
      const filterArea = document.getElementById('filterArea');
      if (allTags.length === 0) { filterArea.style.display = 'none'; return; }
      filterArea.innerHTML =
        `<button class="filter-btn active" onclick="setTag(null, this)">すべて</button>` +
        allTags.map(tag =>
          `<button class="filter-btn" onclick="setTag('${tag}', this)">${tag}</button>`
        ).join('');
    }

    function setTag(tag, btn) {
      activeTag = tag;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderCards();
    }

    function renderCards() {
      const filtered = activeTag
        ? allEntries.filter(e => (e.tags || []).includes(activeTag))
        : allEntries;
      const list = document.getElementById('comic-list');
      list.innerHTML = '';
      filtered.forEach(e => {
        const div = document.createElement('div');
        div.className = 'work-card';
        div.onclick = () => openModal(e);
        const tagsHtml = (e.tags && e.tags.length)
          ? `<div class="card-tags">${e.tags.map(t =>
              `<span class="tag-label${t === activeTag ? ' active' : ''}"
                     onclick="event.stopPropagation(); setTagFromCard('${t}')">${t}</span>`
            ).join('')}</div>`
          : '';
        div.innerHTML = `
          <div class="work-card-thumb">
            ${e.thumbnail ? `<img src="${e.thumbnail}" loading="lazy">` : ''}
          </div>
          <div class="work-card-body">
            <p style="font-size:0.8rem; color:#a08a6e; margin-bottom:4px;">${e.serial || ''}</p>
            <p style="font-size:0.95rem; color:#4a4235;">${e.title || ''}</p>
            ${tagsHtml}
          </div>
        `;
        list.appendChild(div);
      });
    }

    function setTagFromCard(tag) {
      activeTag = (activeTag === tag) ? null : tag;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', activeTag === null ? b.textContent === 'すべて' : b.textContent === tag);
      });
      renderCards();
    }

    function openModal(e) {
      const track = document.getElementById('modal-track');
      const dots = document.getElementById('modal-dots');
      currentIdx = 0;
      const images = e.images && e.images.length > 0 ? e.images : (e.thumbnail ? [e.thumbnail] : []);
      imageCount = images.length;

      track.innerHTML = images.map(url =>
        `<div class="slider-item"><img src="${url}" loading="lazy"></div>`
      ).join('');
      dots.innerHTML = images.map((_, i) =>
        `<button class="dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></button>`
      ).join('');

      document.getElementById('modal-serial').innerText = e.serial || '';
      document.getElementById('modal-title').innerText = e.title || '';
      document.getElementById('modal-description').innerText = e.description || '';

      const tagsEl = document.getElementById('modal-tags');
      tagsEl.innerHTML = (e.tags || []).map(t =>
        `<span class="tag-label${t === activeTag ? ' active' : ''}"
               onclick="filterFromModal('${t}')">${t}</span>`
      ).join('');

      document.getElementById('slider-controls').style.display = imageCount > 1 ? 'flex' : 'none';
      updateSlider();
      document.getElementById('modal').style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function filterFromModal(tag) {
      closeModal();
      activeTag = (activeTag === tag) ? null : tag;
      document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('active', activeTag === null ? b.textContent === 'すべて' : b.textContent === tag);
      });
      renderCards();
    }

    // ループするスライダー（最後→最初、最初→最後）
    function moveSlider(step) {
      currentIdx = (currentIdx + step + imageCount) % imageCount;
      updateSlider();
    }

    function goToSlide(i) {
      currentIdx = i;
      updateSlider();
    }

    function updateSlider() {
      document.getElementById('modal-track').style.transform = `translateX(-${currentIdx * 100}%)`;
      document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === currentIdx));
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      document.body.style.overflow = '';
    }

    document.addEventListener('keydown', ev => {
      if (document.getElementById('modal').style.display !== 'block') return;
      if (ev.key === 'Escape') closeModal();
      if (ev.key === 'ArrowLeft') moveSlider(-1);
      if (ev.key === 'ArrowRight') moveSlider(1);
    });

    loadComics();
  </script>

  <script src="../js/layout.js"></script>
</body>
</html>
